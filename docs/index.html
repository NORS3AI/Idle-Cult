<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <title>Idle Cult</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="phone">
    <!-- status bar -->
    <div class="statusbar">
      <div class="sb-left"><span id="statusTime">7:32</span></div>
      <div class="sb-right">
        <span class="sb-cell">▂▄▆█</span>
        <span class="sb-wifi">◗</span>
        <span class="sb-batt">56</span>
      </div>
    </div>

    <!-- header -->
    <header class="topbar">
      <div class="money-wrap">
        <div id="money" class="money">10¢</div>
        <div id="rate" class="rate"></div>
      </div>
      <span id="manaTop" class="mana-top">✦&nbsp;0</span>
      <div class="top-right">
        <button id="speedBtn" class="mult-chip" title="Game speed — tap to change">×<span id="mult">1</span></button>
        <button id="menuBtn" class="menu-btn" aria-label="settings">⚙</button>
      </div>
    </header>

    <!-- settings modal -->
    <div id="settings" class="modal" style="display:none">
      <div class="modal-card">
        <div class="modal-head"><h2 class="card-title">Settings</h2><button id="settingsClose" class="menu-btn">✕</button></div>
        <div id="settingsBody"></div>
      </div>
    </div>

    <!-- tab bar -->
    <nav id="tabbar" class="tabbar"></nav>

    <main class="content">
      <!-- HOME (Grove) -->
      <div id="view-home" class="view">
        <section class="card">
          <h2 class="card-title">Buy</h2>
          <button id="buyUp" class="collapse-bar" aria-label="previous upgrades">⌃</button>
          <div id="buyList" class="list"></div>
          <button id="buyDown" class="collapse-bar" aria-label="next upgrades">⌄</button>
        </section>

        <section class="card">
          <h2 class="card-title">Seeds</h2>
          <div id="seedList" class="list"></div>
        </section>

        <section class="card">
          <h2 class="card-title">Planters</h2>
          <div id="planterList" class="list"></div>
        </section>

        <section id="ritualCard" class="card ritual locked">
          <h2 class="card-title">Ritual slate</h2>
          <div id="ritualBody" class="ritual-body"></div>
        </section>
      </div>

      <!-- NOTEBOOK -->
      <div id="view-notebook" class="view" style="display:none">
        <section class="card"><h2 class="card-title">Notebook</h2><div id="notebookBody"></div></section>
      </div>

      <!-- COMBAT -->
      <div id="view-combat" class="view" style="display:none">
        <section class="card"><h2 class="card-title">Combat</h2><div id="combatBody"></div></section>
      </div>

      <!-- RESEARCH -->
      <div id="view-research" class="view" style="display:none">
        <section class="card"><h2 class="card-title">Research</h2><div id="researchBody"></div></section>
      </div>

      <!-- PRESTIGE -->
      <div id="view-prestige" class="view" style="display:none">
        <section class="card"><h2 class="card-title">Prestige</h2><div id="prestigeBody"></div></section>
      </div>

      <div class="footer">a small idle game · grow · sell · invoke</div>
    </main>
  </div>

  <div id="toast" class="toast"></div>
  <div id="fx" class="fx"></div>

  <script src="js/data.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
